<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kosha Bowls — Clean Food. Pure Life.</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Lato',sans-serif;background:#faf8f3;color:#2c2c2c}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:#4a7c5c;border-radius:10px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
    @keyframes popIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
    @keyframes leafFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-18px) rotate(8deg)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .card-hover{transition:all 0.3s ease}
    .card-hover:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(74,124,92,0.18)!important}
    .btn-green{background:#4a7c5c;color:white;border:none;padding:14px 32px;border-radius:50px;cursor:pointer;font-family:'Lato',sans-serif;font-size:15px;font-weight:700;letter-spacing:0.5px;transition:all 0.25s}
    .btn-green:hover{background:#3a6a4c;transform:translateY(-2px);box-shadow:0 10px 30px rgba(74,124,92,0.35)}
    .nav-link{cursor:pointer;transition:color 0.2s}
    .nav-link:hover{color:#2d6a4f!important}
    .tag-btn{transition:all 0.2s;font-family:'Lato',sans-serif;cursor:pointer}
    .tag-btn:hover{transform:scale(1.05)}
    .tag-btn.active{background:#4a7c5c!important;color:white!important;border-color:#4a7c5c!important}
    .add-btn{transition:background 0.2s;cursor:pointer}
    .add-btn:hover{background:#3a6a4c!important}
    .qty-btn{cursor:pointer;transition:all 0.2s}
    .qty-btn:hover{background:#4a7c5c!important;color:white!important}
    .admin-input{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-family:'Lato',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
    .admin-input:focus{border-color:#4a7c5c}
    .leaf1{position:absolute;top:-10%;right:-5%;width:500px;height:500px;border-radius:60% 40% 55% 45%;background:rgba(255,255,255,0.04);animation:leafFloat 8s ease-in-out infinite}
    .leaf2{position:absolute;bottom:-15%;left:-5%;width:600px;height:600px;border-radius:45% 55% 40% 60%;background:rgba(255,255,255,0.03);animation:leafFloat 11s ease-in-out infinite reverse}
    .wa-float{position:fixed;bottom:24px;right:24px;z-index:999;background:#25D366;color:white;border:none;border-radius:50%;width:60px;height:60px;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(37,211,102,0.5);display:flex;align-items:center;justify-content:center;transition:all 0.2s}
    .wa-float:hover{transform:scale(1.1);box-shadow:0 8px 30px rgba(37,211,102,0.6)}
    @media(max-width:768px){
      .hero-grid{grid-template-columns:1fr!important}
      .hero-cards{display:none!important}
      .values-grid{grid-template-columns:1fr 1fr!important}
      .menu-grid{grid-template-columns:1fr!important}
      .footer-grid{grid-template-columns:1fr 1fr!important}
      nav{padding:0 16px!important}
      .nav-links{gap:12px!important}
      h1.hero-title{font-size:42px!important}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const DEFAULT_MENU = {
  "Signature Bowls":[
    {id:1,name:"Butter Chicken Power Bowl",price:349,cal:580,badge:"🌟 Best Seller",desc:"Free-range chicken in a rich tomato-cashew gravy, brown basmati rice, cucumber raita, fresh coriander — no artificial colour, no preservatives",tags:["High Protein"],emoji:"🍛",color:"#c45c38",available:true},
    {id:2,name:"Tandoori Paneer Protein Bowl",price:299,cal:510,badge:"💪 High Protein",desc:"Hormone-free paneer marinated in yogurt & spices, grilled in a clay oven, served over millets with mint chutney & roasted bell peppers",tags:["Vegetarian","High Protein"],emoji:"🧀",color:"#e07b39",available:true},
    {id:3,name:"Satvik Veg Nourish Bowl",price:269,cal:420,badge:"🌿 Staff Pick",desc:"Seasonal organic sabzi, steamed brown rice, raw salad, sprouted moong, lemon tadka — light, satvik and deeply nourishing",tags:["Vegan","Gluten-Free"],emoji:"🥗",color:"#4a7c5c",available:true},
    {id:4,name:"Chickpea & Millet Energy Bowl",price:279,cal:490,badge:"⚡ Energy Boost",desc:"Organic kala chana, pearl millet base, roasted sweet potato, tamarind dressing, pomegranate, microgreens — ancient grains, modern nutrition",tags:["Vegan","Gluten-Free"],emoji:"🌾",color:"#b87333",available:true},
    {id:5,name:"Egg Bhurji Protein Bowl",price:299,cal:530,badge:"🥚 Power Up",desc:"Farm-fresh desi eggs scrambled with onion, tomato, green chilli & turmeric, served over quinoa with a side of whole wheat roti strips",tags:["High Protein"],emoji:"🍳",color:"#d4a017",available:true},
  ],
  "Shawarmaz":[
    {id:6,name:"Chicken Shawarma Roll",price:249,cal:460,badge:"🔥 Trending",desc:"Free-range chicken marinated overnight in Lebanese spices, slow-roasted, wrapped in whole wheat pita with garlic yogurt, pickled onions, fresh greens — zero seed oils used",tags:["High Protein"],emoji:"🌯",color:"#c17f3a",available:true},
    {id:7,name:"Veg Shawarma Roll",price:199,cal:380,badge:"🌱 Fan Fave",desc:"Spiced roasted paneer & chickpeas, whole wheat pita, hummus, shredded purple cabbage, cucumber, tomato, tahini drizzle — flavour without compromise",tags:["Vegetarian"],emoji:"🥙",color:"#7c5c9a",available:true},
  ],
  "Shorbas (Soups)":[
    {id:8,name:"Lentil Protein Shorba",price:149,cal:210,badge:"✨ Anti-Inflammatory",desc:"Organic masoor dal slow-cooked with cumin, ginger, haldi and black pepper — a gut-healing, protein-rich bowl of warmth",tags:["Vegan","Gluten-Free"],emoji:"🍲",color:"#c0392b",available:true},
    {id:9,name:"Spinach Garlic Shorba",price:149,cal:160,badge:"💚 Detox",desc:"Farm-fresh palak blended with roasted garlic, cold-press olive oil and sea salt — iron-rich, toxin-free, made fresh every morning. No MSG, no fillers",tags:["Vegan","Gluten-Free"],emoji:"🥬",color:"#2d6a4f",available:true},
  ],
  "Drinks & Elixirs":[
    {id:10,name:"Turmeric Golden Milk",price:129,cal:110,badge:"✨ Healing",desc:"Organic haldi, black pepper, A2 cow milk, raw honey, cardamom — an ancient Ayurvedic recipe with zero refined sugar",tags:["Vegetarian"],emoji:"🥛",color:"#f0a500",available:true},
    {id:11,name:"Beet & Berry Immunity Shot",price:149,cal:95,badge:"💜 Antioxidant",desc:"Cold-pressed organic beetroot, amla, wild berries, ginger — no preservatives, no added sugar, bottled same day",tags:["Vegan","Raw+"],emoji:"🫐",color:"#8e44ad",available:true},
    {id:12,name:"Pressed Green Detox Juice",price:159,cal:80,badge:"🌿 Cold Press",desc:"Cucumber, celery, spinach, green apple, ginger, nimbu — cold pressed daily, zero heat treatment to preserve live enzymes",tags:["Vegan","Raw+"],emoji:"🥒",color:"#27ae60",available:true},
  ],
};

const DEFAULT_DEAL = {active:false,text:"🎉 Grand Opening Special! Get 20% OFF on all Signature Bowls today. Use code: KOSHA20"};

const TAG_COLORS = {
  "Vegan":{bg:"#e8f5e9",color:"#2d6a4f"},
  "Gluten-Free":{bg:"#fff3e0",color:"#a04000"},
  "High Protein":{bg:"#fce4ec",color:"#880e4f"},
  "Vegetarian":{bg:"#f1f8e9",color:"#33691e"},
  "Raw+":{bg:"#e0f2f1",color:"#00695c"},
};

const INGREDIENTS = ["Cold-Press Mustard Oil","A2 Desi Cow Dairy","Organic Basmati Rice","Stone-Ground Whole Wheat","Farm-Fresh Desi Eggs","Free-Range Chicken","Organic Masoor Dal","Hormone-Free Paneer","Himalayan Pink Salt","Raw Forest Honey","Organic Turmeric","Virgin Coconut Oil","Sprouted Legumes","Ancient Millets","Cold-Press Olive Oil","No MSG · No Maida · No Seed Oils"];

const WA_NUMBER = "919211260654";
const EMAIL = "koshaearth@gmail.com";
const PHONE = "+91 92112 60654";
const ADMIN_PASSWORD = "kosha2024";

function KoshaBowls() {
  const [menu, setMenu] = useState(() => {
    try { const s = localStorage.getItem('kb_menu'); return s ? JSON.parse(s) : DEFAULT_MENU; } catch { return DEFAULT_MENU; }
  });
  const [deal, setDeal] = useState(() => {
    try { const s = localStorage.getItem('kb_deal'); return s ? JSON.parse(s) : DEFAULT_DEAL; } catch { return DEFAULT_DEAL; }
  });
  const [activeSection, setActiveSection] = useState(Object.keys(menu)[0]);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [orderPlaced, setOrderPlaced] = useState(false);
  const [heroVisible, setHeroVisible] = useState(false);
  const [notification, setNotification] = useState("");
  const [activePage, setActivePage] = useState("home");
  const [adminOpen, setAdminOpen] = useState(false);
  const [adminAuth, setAdminAuth] = useState(false);
  const [adminPass, setAdminPass] = useState("");
  const [adminPassError, setAdminPassError] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [addItemMode, setAddItemMode] = useState(false);
  const [newItem, setNewItem] = useState({name:"",price:"",cal:"",badge:"",desc:"",emoji:"🥗",category:Object.keys(menu)[0],tags:[],available:true});
  const [contactForm, setContactForm] = useState({name:"",phone:"",message:""});
  const [contactSent, setContactSent] = useState(false);
  const [dealEdit, setDealEdit] = useState(false);
  const [dealText, setDealText] = useState(deal.text);

  useEffect(() => { setTimeout(() => setHeroVisible(true), 100); }, []);
  useEffect(() => { try { localStorage.setItem('kb_menu', JSON.stringify(menu)); } catch{} }, [menu]);
  useEffect(() => { try { localStorage.setItem('kb_deal', JSON.stringify(deal)); } catch{} }, [deal]);

  const notify = (msg) => { setNotification(msg); setTimeout(() => setNotification(""), 2500); };

  const addToCart = (item) => {
    if (!item.available) return;
    setCart(prev => {
      const ex = prev.find(c => c.id === item.id);
      if (ex) return prev.map(c => c.id === item.id ? {...c, qty: c.qty+1} : c);
      return [...prev, {...item, qty:1}];
    });
    notify(`🌿 ${item.name} added!`);
  };

  const updateQty = (id, delta) => {
    setCart(prev => prev.map(c => c.id === id ? {...c, qty: Math.max(0, c.qty+delta)} : c).filter(c => c.qty > 0));
  };

  const total = cart.reduce((s,c) => s + c.price*c.qty, 0);
  const itemCount = cart.reduce((s,c) => s + c.qty, 0);

  const placeOrder = () => {
    const orderNum = Math.floor(Math.random()*9000+1000);
    const msg = cart.map(c => `${c.emoji} ${c.name} x${c.qty} = ₹${c.price*c.qty}`).join('\n');
    const waMsg = encodeURIComponent(`🌿 *New Order - Kosha Bowls!*\n\nOrder #KB-${orderNum}\n\n${msg}\n\n💰 *Total: ₹${total}*\n\nPlease confirm my order! 🙏`);
    window.open(`https://wa.me/${WA_NUMBER}?text=${waMsg}`, '_blank');
    setOrderPlaced(true);
    setCartOpen(false);
    setCart([]);
    setTimeout(() => setOrderPlaced(false), 5000);
  };

  const sendContact = () => {
    if (!contactForm.name || !contactForm.message) return;
    const msg = encodeURIComponent(`🌿 *Message from Kosha Bowls Website*\n\n*Name:* ${contactForm.name}\n*Phone:* ${contactForm.phone||'Not provided'}\n\n*Message:*\n${contactForm.message}`);
    window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`, '_blank');
    setContactSent(true);
    setContactForm({name:"",phone:"",message:""});
    setTimeout(() => setContactSent(false), 4000);
  };

  // ADMIN functions
  const loginAdmin = () => {
    if (adminPass === ADMIN_PASSWORD) { setAdminAuth(true); setAdminPassError(false); }
    else { setAdminPassError(true); }
  };

  const saveEditItem = () => {
    const updatedMenu = {};
    Object.keys(menu).forEach(cat => {
      updatedMenu[cat] = menu[cat].map(item => item.id === editItem.id ? editItem : item);
    });
    setMenu(updatedMenu);
    setEditItem(null);
    notify("✅ Item updated!");
  };

  const deleteItem = (cat, id) => {
    const updatedMenu = {...menu, [cat]: menu[cat].filter(i => i.id !== id)};
    setMenu(updatedMenu);
    notify("🗑️ Item removed!");
  };

  const toggleAvailable = (cat, id) => {
    const updatedMenu = {...menu, [cat]: menu[cat].map(i => i.id === id ? {...i, available: !i.available} : i)};
    setMenu(updatedMenu);
  };

  const addNewItem = () => {
    if (!newItem.name || !newItem.price) return;
    const id = Date.now();
    const item = {...newItem, id, price: parseInt(newItem.price), cal: parseInt(newItem.cal)||0};
    const cat = newItem.category;
    const updatedMenu = {...menu, [cat]: [...(menu[cat]||[]), item]};
    setMenu(updatedMenu);
    setAddItemMode(false);
    setNewItem({name:"",price:"",cal:"",badge:"",desc:"",emoji:"🥗",category:Object.keys(menu)[0],tags:[],available:true});
    notify("✅ New item added!");
  };

  const saveDeal = () => {
    setDeal({...deal, text: dealText});
    setDealEdit(false);
    notify("✅ Deal updated!");
  };

  const allItems = Object.values(menu).flat();

  return (
    <div style={{fontFamily:"'Lato',sans-serif",background:"#faf8f3",minHeight:"100vh",color:"#2c2c2c"}}>

      {/* WhatsApp Float Button */}
      <button className="wa-float" onClick={() => window.open(`https://wa.me/${WA_NUMBER}?text=Hi! I'd like to know more about Kosha Bowls 🌿`, '_blank')}>
        💬
      </button>

      {/* Toast */}
      {notification && (
        <div style={{position:"fixed",top:80,right:24,background:"#2d6a4f",color:"white",padding:"12px 24px",borderRadius:50,zIndex:9999,fontWeight:700,fontSize:14,animation:"popIn 0.3s ease",boxShadow:"0 8px 30px rgba(45,106,79,0.35)"}}>
          {notification}
        </div>
      )}

      {/* Order Success */}
      {orderPlaced && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"white",borderRadius:24,padding:"48px 60px",textAlign:"center",animation:"popIn 0.4s ease",maxWidth:400}}>
            <div style={{fontSize:72,marginBottom:20}}>🌿</div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:28,color:"#2d6a4f",marginBottom:12}}>Order Sent to WhatsApp!</h2>
            <p style={{color:"#666",fontSize:15,lineHeight:1.7}}>We'll confirm your order shortly.<br/>Thank you for choosing Kosha Bowls! 🙏</p>
          </div>
        </div>
      )}

      {/* ═══ ADMIN PANEL ═══ */}
      {adminOpen && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"white",borderRadius:20,width:"100%",maxWidth:780,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
            
            {/* Admin Header */}
            <div style={{background:"linear-gradient(135deg,#1a3d2b,#2d6a4f)",padding:"24px 32px",borderRadius:"20px 20px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <h2 style={{color:"white",fontFamily:"'Playfair Display',serif",fontSize:24}}>🌿 Kosha Bowls Admin</h2>
                <p style={{color:"#a8d5b5",fontSize:13,marginTop:4}}>Manage your menu, prices & deals</p>
              </div>
              <button onClick={() => {setAdminOpen(false);setAdminAuth(false);setAdminPass("");}} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"white",width:36,height:36,borderRadius:"50%",cursor:"pointer",fontSize:18}}>✕</button>
            </div>

            {!adminAuth ? (
              /* Login */
              <div style={{padding:48,textAlign:"center"}}>
                <div style={{fontSize:56,marginBottom:20}}>🔐</div>
                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:22,marginBottom:8}}>Admin Login</h3>
                <p style={{color:"#888",marginBottom:28,fontSize:14}}>Enter your admin password to continue</p>
                <input className="admin-input" type="password" placeholder="Enter password" value={adminPass}
                  onChange={e => setAdminPass(e.target.value)}
                  onKeyDown={e => e.key==='Enter' && loginAdmin()}
                  style={{maxWidth:300,textAlign:"center",fontSize:16,letterSpacing:"0.2em"}}/>
                {adminPassError && <p style={{color:"#e74c3c",fontSize:13,marginTop:8}}>❌ Wrong password. Try again.</p>}
                <br/>
                <button className="btn-green" onClick={loginAdmin} style={{marginTop:20,padding:"12px 40px"}}>Login →</button>
                <p style={{color:"#aaa",fontSize:12,marginTop:16}}>Default password: kosha2024</p>
              </div>
            ) : (
              <div style={{padding:32}}>

                {/* DEAL BANNER */}
                <div style={{background:"#fff8e1",border:"1.5px solid #f0c030",borderRadius:14,padding:20,marginBottom:28}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <h3 style={{fontSize:16,fontWeight:700,color:"#b8860b"}}>🎉 Deal / Announcement Banner</h3>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <label style={{fontSize:13,color:"#666",display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
                        <input type="checkbox" checked={deal.active} onChange={e => setDeal({...deal,active:e.target.checked})}/>
                        Show on site
                      </label>
                      <button onClick={() => setDealEdit(!dealEdit)} style={{background:"#f0c030",border:"none",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700}}>✏️ Edit</button>
                    </div>
                  </div>
                  {dealEdit ? (
                    <div style={{display:"flex",gap:10}}>
                      <input className="admin-input" value={dealText} onChange={e => setDealText(e.target.value)} style={{flex:1}}/>
                      <button onClick={saveDeal} style={{background:"#2d6a4f",color:"white",border:"none",padding:"10px 20px",borderRadius:8,cursor:"pointer",fontWeight:700}}>Save</button>
                    </div>
                  ) : (
                    <p style={{fontSize:14,color:"#666"}}>{deal.text}</p>
                  )}
                </div>

                {/* ADD NEW ITEM */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#1a3d2b"}}>Menu Items</h3>
                  <button onClick={() => setAddItemMode(!addItemMode)} style={{background:"#4a7c5c",color:"white",border:"none",padding:"10px 20px",borderRadius:50,cursor:"pointer",fontWeight:700,fontSize:14}}>
                    {addItemMode ? "Cancel" : "+ Add New Item"}
                  </button>
                </div>

                {/* Add Item Form */}
                {addItemMode && (
                  <div style={{background:"#f0f8f4",border:"1.5px solid #4a7c5c",borderRadius:14,padding:24,marginBottom:24}}>
                    <h4 style={{marginBottom:16,color:"#2d6a4f",fontWeight:700}}>➕ New Menu Item</h4>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                      <div>
                        <label style={{fontSize:12,color:"#888",display:"block",marginBottom:4}}>ITEM NAME *</label>
                        <input className="admin-input" placeholder="e.g. Mango Lassi" value={newItem.name} onChange={e => setNewItem({...newItem,name:e.target.value})}/>
                      </div>
                      <div>
                        <label style={{fontSize:12,color:"#888",display:"block",marginBottom:4}}>PRICE (₹) *</label>
                        <input className="admin-input" type="number" placeholder="149" value={newItem.price} onChange={e => setNewItem({...newItem,price:e.target.value})}/>
                      </div>
                      <div>
                        <label style={{fontSize:12,color:"#888",display:"block",marginBottom:4}}>EMOJI</label>
                        <input className="admin-input" placeholder="🥗" value={newItem.emoji} onChange={e => setNewItem({...newItem,emoji:e.target.value})}/>
                      </div>
                      <div>
                        <label style={{fontSize:12,color:"#888",display:"block",marginBottom:4}}>CALORIES</label>
                        <input className="admin-input" type="number" placeholder="400" value={newItem.cal} onChange={e => setNewItem({...newItem,cal:e.target.value})}/>
                      </div>
                      <div>
                        <label style={{fontSize:12,color:"#888",display:"block",marginBottom:4}}>BADGE (optional)</label>
                        <input className="admin-input" placeholder="🆕 New" value={newItem.badge} onChange={e => setNewItem({...newItem,badge:e.target.value})}/>
                      </div>
                      <div>
                        <label style={{fontSize:12,color:"#888",display:"block",marginBottom:4}}>CATEGORY</label>
                        <select className="admin-input" value={newItem.category} onChange={e => setNewItem({...newItem,category:e.target.value})}>
                          {Object.keys(menu).map(cat => <option key={cat}>{cat}</option>)}
                        </select>
                      </div>
                    </div>
                    <div style={{marginBottom:12}}>
                      <label style={{fontSize:12,color:"#888",display:"block",marginBottom:4}}>DESCRIPTION</label>
                      <textarea className="admin-input" rows={2} placeholder="Describe your item..." value={newItem.desc} onChange={e => setNewItem({...newItem,desc:e.target.value})} style={{resize:"none"}}/>
                    </div>
                    <button className="btn-green" onClick={addNewItem} style={{padding:"12px 32px"}}>Add to Menu ✅</button>
                  </div>
                )}

                {/* Edit Item Modal */}
                {editItem && (
                  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
                    <div style={{background:"white",borderRadius:20,padding:32,width:"100%",maxWidth:500,maxHeight:"85vh",overflowY:"auto"}}>
                      <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,marginBottom:20,color:"#1a3d2b"}}>✏️ Edit Item</h3>
                      {[
                        {label:"Item Name",key:"name",type:"text"},

            <div key={heading} style={{marginBottom:44}}>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,color:"#1a3d2b",marginBottom:14}}>{heading}</h2>
              <p style={{fontSize:16,color:"#555",lineHeight:1.95}}>{body}</p>
            </div>
          ))}
          <div style={{background:"linear-gradient(135deg,#1a3d2b,#2d6a4f)",borderRadius:20,padding:"40px 48px",textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:16}}>🌱</div>
            <p style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"white",fontStyle:"italic",lineHeight:1.6}}>"Eat clean. Live full. That's the Kosha way."</p>
            <p style={{color:"#7aad8c",marginTop:12,fontSize:13,letterSpacing:"0.1em"}}>— KOSHA BOWLS · KAPURTHALA, PUNJAB</p>
          </div>
        </div>
      )}

      {/* ═══════════ LOCATION ═══════════ */}
      {activePage==="locations" && (
        <div style={{maxWidth:600,margin:"0 auto",padding:"72px 40px 100px"}}>
          <div style={{textAlign:"center",marginBottom:60}}>
            <p style={{fontSize:11,letterSpacing:"0.3em",color:"#a0855a",marginBottom:12,fontWeight:700}}>FIND US</p>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:50,fontWeight:900,color:"#1a3d2b"}}>Our Location</h1>
          </div>
          <div style={{background:"white",borderRadius:24,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.1)"}}>
            <div style={{background:"linear-gradient(135deg,#2d6a4f,#4a7c5c)",padding:"40px 36px 32px",position:"relative"}}>
              <span style={{position:"absolute",top:20,right:20,background:"rgba(255,255,255,0.2)",color:"white",fontSize:11,fontWeight:700,padding:"5px 14px",borderRadius:50}}>Now Open</span>
              <div style={{fontSize:56,marginBottom:12}}>🌿</div>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:32,color:"white",fontWeight:900}}>Kapurthala</h2>
              <p style={{color:"rgba(255,255,255,0.8)",fontSize:15,marginTop:6}}>Punjab · 144601</p>
            </div>
            <div style={{padding:"28px 36px"}}>
              {[["🕐 Hours","Mon–Sun: 11am – 10pm"],["📞 Phone",PHONE],["📧 Email",EMAIL],["📋 FSSAI","Lic. No. 12722999000651"]].map(([label,val]) => (
                <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:"1px solid #f0ebe2"}}>
                  <span style={{fontSize:13,color:"#888",fontWeight:600}}>{label}</span>
                  <span style={{fontSize:13,color:"#2c2c2c",fontWeight:700}}>{val}</span>
                </div>
              ))}
              <button className="btn-green" style={{marginTop:24,width:"100%",padding:14}} onClick={() => window.open("https://maps.google.com/?q=Kapurthala,Punjab,India","_blank")}>
                Get Directions 📍
              </button>
              <button style={{marginTop:12,width:"100%",padding:14,background:"#25D366",color:"white",border:"none",borderRadius:50,cursor:"pointer",fontWeight:700,fontSize:15}} onClick={() => window.open(`https://wa.me/${WA_NUMBER}`,"_blank")}>
                WhatsApp Us 💬
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ═══════════ CONTACT ═══════════ */}
      {activePage==="contact" && (
        <div style={{maxWidth:700,margin:"0 auto",padding:"72px 40px 100px"}}>
          <div style={{textAlign:"center",marginBottom:52}}>
            <p style={{fontSize:11,letterSpacing:"0.3em",color:"#a0855a",marginBottom:12,fontWeight:700}}>GET IN TOUCH</p>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:50,fontWeight:900,color:"#1a3d2b"}}>Contact Us</h1>
            <p style={{color:"#888",marginTop:14,fontSize:16}}>We'd love to hear from you 🌿</p>
          </div>

          {/* Contact Cards */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:48}}>
            {[
              {icon:"💬",label:"WhatsApp",val:"Chat with us",action:() => window.open(`https://wa.me/${WA_NUMBER}`,"_blank")},
              {icon:"📧",label:"Email",val:EMAIL,action:() => window.open(`mailto:${EMAIL}`,"_blank")},
              {icon:"📞",label:"Phone",val:PHONE,action:() => window.open(`tel:${PHONE}`,"_blank")},
            ].map(c => (
              <div key={c.label} onClick={c.action} style={{background:"white",borderRadius:16,padding:"24px 16px",textAlign:"center",boxShadow:"0 4px 20px rgba(0,0,0,0.06)",cursor:"pointer",transition:"all 0.2s"}}
                onMouseEnter={e=>e.currentTarget.style.transform="translateY(-4px)"} onMouseLeave={e=>e.currentTarget.style.transform="none"}>
                <div style={{fontSize:32,marginBottom:10}}>{c.icon}</div>
                <div style={{fontWeight:700,fontSize:14,color:"#1a3d2b",marginBottom:4}}>{c.label}</div>
                <div style={{fontSize:12,color:"#888"}}>{c.val}</div>
              </div>
            ))}
          </div>

          {/* Contact Form */}
          <div style={{background:"white",borderRadius:20,padding:36,boxShadow:"0 4px 24px rgba(0,0,0,0.07)"}}>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:22,marginBottom:24,color:"#1a3d2b"}}>Send us a Message</h3>
            {contactSent ? (
              <div style={{textAlign:"center",padding:"40px 20px"}}>
                <div style={{fontSize:64,marginBottom:16}}>🌿</div>
                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#2d6a4f",marginBottom:8}}>Message Sent!</h3>
                <p style={{color:"#888"}}>We'll get back to you on WhatsApp shortly.</p>
              </div>
            ) : (
              <>
                {[
                  {label:"Your Name *",key:"name",placeholder:"e.g. Priya Singh",type:"text"},
                  {label:"Phone Number",key:"phone",placeholder:"+91 98765 43210",type:"tel"},
                ].map(({label,key,placeholder,type}) => (
                  <div key={key} style={{marginBottom:18}}>
                    <label style={{fontSize:12,color:"#888",display:"block",marginBottom:6,letterSpacing:"0.1em"}}>{label.toUpperCase()}</label>
                    <input className="admin-input" type={type} placeholder={placeholder} value={contactForm[key]} onChange={e => setContactForm({...contactForm,[key]:e.target.value})}/>
                  </div>
                ))}
                <div style={{marginBottom:24}}>
                  <label style={{fontSize:12,color:"#888",display:"block",marginBottom:6,letterSpacing:"0.1em"}}>MESSAGE *</label>
                  <textarea className="admin-input" rows={4} placeholder="Tell us how we can help..." value={contactForm.message} onChange={e => setContactForm({...contactForm,message:e.target.value})} style={{resize:"none"}}/>
                </div>
                <button className="btn-green" onClick={sendContact} style={{width:"100%",padding:16,fontSize:16}}>
                  Send via WhatsApp 📲
                </button>
              </>
            )}
          </div>
        </div>
      )}

      {/* FOOTER */}
      <footer style={{background:"#111e16",color:"#7a9982",padding:"60px 40px 30px"}}>
        <div style={{maxWidth:1100,margin:"0 auto"}}>
          <div className="footer-grid" style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:40,marginBottom:48}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
                <span style={{fontSize:24}}>🌿</span>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"white",fontWeight:900}}>Kosha Bowls</span>
              </div>
              <p style={{fontSize:14,lineHeight:1.8,maxWidth:260}}>Clean food, pure ingredients, honest labels. Proudly serving Kapurthala, Punjab.</p>
              <p style={{fontSize:11,color:"#4a6a52",marginTop:12}}>FSSAI Lic. No. 12722999000651</p>
            </div>
            {[
              {title:"Menu",links:["Signature Bowls","Shawarmaz","Shorbas","Drinks & Elixirs"]},
              {title:"Company",links:["Our Story","Our Ingredients","Location","Careers"]},
              {title:"Connect",links:["Instagram","WhatsApp Order","Contact Us"]},
            ].map(col => (
              <div key={col.title}>
                <h4 style={{color:"white",fontWeight:700,marginBottom:16,letterSpacing:"0.5px",fontSize:14}}>{col.title}</h4>
                {col.links.map(l => (
                  <div key={l} style={{fontSize:14,marginBottom:10,cursor:"pointer",transition:"color 0.2s"}}
                    onMouseEnter={e=>e.target.style.color="#a8d5b5"} onMouseLeave={e=>e.target.style.color="#7a9982"}>{l}</div>
                ))}
              </div>
            ))}
          </div>
          <div style={{borderTop:"1px solid #1e3225",paddingTop:24,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
            <span style={{fontSize:13}}>© 2026 Kosha Bowls. Made with 💚 in Kapurthala, Punjab.</span>
            <span style={{fontSize:13}}>🇮🇳 Proudly Indian · FSSAI Licensed · No Junk Ingredients</span>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<KoshaBowls/>);
  </script>
</body>
</html>
